<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic tac toe</title>
</head>
<style>
   
    h1{
        text-align: center;
        font-size: 45px;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    #main {
    margin-left: 600px;   
    margin-top: 50px;
    text-align: center;
    display: grid;
    grid-template-columns: repeat(3,120px);
    gap: 10px;

}

.box {
    height: 120px;
    width: 120px;
    background-color: lightblue; 
    border: 2px solid #000;
    border-radius: 12px;
    text-align: center;
    display: flex;
    justify-content:space-evenly;
    font-size: 80px;
    
    
}
#info{
    margin-top: 20px;
    font-size: 35px;
    text-align: center;
    font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
}
#re{
    height: 40px;
    width: 110px;
    background-color:rgb(45, 124, 204);
    font-size: 20px;
    border-radius: 10px;
    color: aliceblue;
    font-weight: 800;
    
}
#lal{
    margin-top: 30px;
    text-align: center;
}
</style>


<body>
    <h1>tic tac toe</h1>
    
    <div id="main">
        
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
        <button class="box"></button>
    </div>
    <div id="info">winner:</div>
    <div id="lal"><button id="re">replay</button></div>
    <script src="ttt.js"></script>
</body>
</html>
